services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    image: ${IMAGE_NAME:?Set IMAGE_NAME to the published Docker image, for example ghcr.io/owner/repo:main}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DATABASE: ${MONGO_DATABASE:-hr_cloud}
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mongo_data:
