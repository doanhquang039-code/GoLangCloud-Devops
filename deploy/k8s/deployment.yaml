apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-cloud-devops-service
  namespace: hr-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hr-cloud-devops-service
  template:
    metadata:
      labels:
        app: hr-cloud-devops-service
    spec:
      containers:
        - name: api
          image: hr-cloud-devops-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MONGO_URI
              value: "mongodb://mongo:27017"
            - name: MONGO_DATABASE
              value: "hr_cloud"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
